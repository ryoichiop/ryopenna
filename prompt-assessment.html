  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#faf9f7;--bg2:#f5f4f1;--border:rgba(26,26,26,0.08);--border-light:rgba(26,26,26,0.04);--accent:#2dd4bf;--accent-glow:rgba(45,212,191,0.25);--accent-subtle:rgba(45,212,191,0.08);--ink:#1a1a1a;--ink2:rgba(26,26,26,0.55);--ink3:rgba(26,26,26,0.35);--radius:12px;--radius-btn:8px;--radius-badge:4px;--ease:cubic-bezier(.16,1,.3,1)}

  .btn-share-linkedin:hover{background:#004182;transform:scale(1.02)}
  .btn-share-linkedin svg{flex-shrink:0;width:18px;height:18px}

<script>
const { useState, useCallback, useMemo, createElement: h } = React;

const SCENARIOS_PT = [
  { id: 0, situation: "Um colega te manda uma mensagem: \"Preciso que voc\u00ea revise esse documento at\u00e9 sexta. \u00c9 importante.\"", options: [
    { dim: "intencao", text: "Perguntar se ele quer uma opini\u00e3o sincera, uma revis\u00e3o t\u00e9cnica ou s\u00f3 uma aprova\u00e7\u00e3o" },
    { dim: "contexto", text: "Querer saber quem vai ler o documento e em que reuni\u00e3o ele ser\u00e1 usado" },
    { dim: "restricao", text: "Combinar o formato da entrega: coment\u00e1rios no texto, lista de pontos ou conversa?" },
    { dim: "abertura", text: "Perguntar \"tem algo espec\u00edfico que te preocupa nesse documento?\"" },
  ]},
  { id: 1, situation: "Algu\u00e9m do time diz: \"Acho que a gente devia repensar esse projeto.\"", options: [
    { dim: "intencao", text: "Perguntar o que, concretamente, essa pessoa gostaria que fosse diferente" },
    { dim: "contexto", text: "Tentar entender o que mudou desde o in\u00edcio do projeto que gerou essa fala" },
    { dim: "restricao", text: "Mapear: o problema \u00e9 o escopo, o prazo, a equipe ou a dire\u00e7\u00e3o?" },
    { dim: "abertura", text: "Perguntar \"se voc\u00ea pudesse mudar uma coisa agora, qual seria?\"" },
  ]},
  { id: 2, situation: "Voc\u00ea precisa pedir a algu\u00e9m uma apresenta\u00e7\u00e3o sobre os resultados do trimestre.", options: [
    { dim: "intencao", text: "Dizer qual decis\u00e3o precisa sair da reuni\u00e3o e o que essa apresenta\u00e7\u00e3o precisa viabilizar" },

    { dim: "restricao", text: "Combinar tempo, formato e as tr\u00eas m\u00e9tricas que n\u00e3o podem faltar" },

  { id: 3, situation: "Um amigo te liga e diz: \"Estou pensando em pedir demiss\u00e3o. O que voc\u00ea acha?\"", options: [
    { dim: "intencao", text: "Perguntar o que ele imagina que vai ser diferente no dia seguinte \u00e0 demiss\u00e3o" },
    { dim: "contexto", text: "Perguntar h\u00e1 quanto tempo ele est\u00e1 sentindo isso e o que aconteceu recentemente" },
    { dim: "restricao", text: "Ajudar a listar o que precisa estar resolvido \u2014 financeiro, emocional, pr\u00e1tico \u2014 antes de decidir" },

const SCENARIOS_EN = [

function seededShuffle(arr, seed) {
  var a = arr.slice();
  var s = seed;
  for (var i = a.length - 1; i > 0; i--) {
    s = (s * 16807) % 2147483647;
    var j = s % (i + 1);
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function computeResult(answers) {
  var scores = { intencao: 0, contexto: 0, restricao: 0, abertura: 0 };
  var fc = { intencao: 0, contexto: 0, restricao: 0, abertura: 0 };
  Object.values(answers).forEach(function(v) {
    if (v.first) { scores[v.first] += 2; fc[v.first]++; }
    if (v.second) scores[v.second] += 1;
  });
  var total = Object.values(scores).reduce(function(a, b) { return a + b; }, 0);
  var sorted = Object.entries(scores).sort(function(a, b) {
    if (b[1] !== a[1]) return b[1] - a[1];
    return (fc[b[0]] || 0) - (fc[a[0]] || 0);
  });
  var dominant = sorted[0][0];
  return { scores: scores, firstCounts: fc, dominant: dominant, leastNatural: sorted.map(function(d) { return d[0]; }).pop(), ranking: sorted.map(function(d) { return d[0]; }), isBalanced: false };
}

      h("div", { className: "wrap" },

        screen === "intro" && h("div", { className: "slide-enter", key: "i-" + slideKey },
          h("div", { className: "intro-wrap" },
            h("h1", { className: "intro-title" }, ui.title),
            h("div", { className: "intro-lines" },
              h("p", { className: "intro-line" }, ui.introLine1),
              h("p", { className: "intro-line" }, ui.introLine2),
              h("p", { className: "intro-meta" }, ui.introMeta)
            ),
            h("button", { className: "btn-start", onClick: function() { setScreen("scenario"); setSlideKey(function(k) { return k + 1; }); } },
              h("span", { className: "btn-start-arrow" },
                h("svg", { width: 14, height: 14, viewBox: "0 0 14 14", fill: "none" },
                  h("path", { d: "M3 7h8M8 4l3 3-3 3", stroke: "#0e1117", strokeWidth: "1.5", strokeLinecap: "round", strokeLinejoin: "round" })
                )
              ),
              ui.start
            )
          ),
          h(Footer)
        ),

        screen === "collect" && h("div", { className: "slide-enter", key: "c-" + slideKey },
          h("div", { className: "collect-wrap" },
            h("h2", { className: "collect-title" }, ui.collectTitle),
            h("p", { className: "collect-sub" }, ui.collectSub),
            h("div", { className: "collect-form" },
              h("input", { className: "collect-input" + (formError.name ? " error" : ""), type: "text", placeholder: ui.namePlaceholder, value: userName, onChange: function(e) { setUserName(e.target.value); setFormError(function(f) { var n = Object.assign({}, f); delete n.name; return n; }); } }),
              h("input", { className: "collect-input" + (formError.email ? " error" : ""), type: "email", placeholder: ui.emailPlaceholder, value: userEmail, onChange: function(e) { setUserEmail(e.target.value); setFormError(function(f) { var n = Object.assign({}, f); delete n.email; return n; }); } }),
              h("input", { className: "collect-input", type: "text", placeholder: ui.companyPlaceholder, value: userCompany, onChange: function(e) { setUserCompany(e.target.value); }, onKeyDown: function(e) { if (e.key === "Enter") handleCollectSubmit(); } }),
              h("button", { className: "btn-continue", onClick: handleCollectSubmit }, ui.continueBtn)
            )
          ),
          h(Footer)
        ),

        screen === "scenario" && sc && h("div", { className: "slide-enter", key: "s-" + slideKey + "-" + phase },
          h("div", { className: "q-counter" }, (scenarioIdx + 1) + " " + ui.of + " " + scenarios.length),
          h("div", { className: "q-situation-wrap" },
            h("p", { className: "q-situation" }, sc.situation)
          ),
          h("div", { className: "q-prompt" }, phase === 1 ? ui.q1 : ui.q2),
          h("div", { className: "options" },
            sc.options.map(function(o, idx) {
              var is1 = firstPick && firstPick.idx === idx;
              var chosen = is1 && phase === 2;
              var faded = phase === 2 && is1;
              return h("button", {
                key: idx,
                className: "option-card" + (chosen ? " chosen locked" : "") + (faded ? " faded" : ""),
                onClick: function() { if (faded) return; phase === 1 ? pick1(o.dim, idx) : pick2(o.dim); }
              },
                h("span", { className: "opt-text" }, o.text),
                chosen && h("span", { className: "opt-badge" }, "1\u00b0")
              );
            })
          ),
          h(Footer)
        ),

        screen === "result" && result && (function() {
          var p = profiles[result.dominant];
          var dc = result.isBalanced ? "#2dd4bf" : DIM_COLORS[result.dominant];
          var least = result.leastNatural;
          var leastColor = DIM_COLORS[least];
          return h("div", { className: "slide-enter", key: "r-" + slideKey },
            h("div", { className: "res-hero-label" }, ui.tagResult),
            h("div", { className: "res-hero-name", style: { color: dc } }, p.title),
            h("div", { className: "res-style-pills" },
              result.ranking.map(function(dim) {
                var m = dimMeta[dim];
                var c = DIM_COLORS[dim];
                var isActive = dim === result.dominant;
                return h("span", { key: dim, className: "style-pill" + (isActive ? " active" : ""), style: isActive ? { borderColor: c, color: c } : {} }, m.name);
              })
            ),
            h("div", { className: "res-headline-wrap" },
              h("div", { className: "res-accent-bar", style: { background: dc } }),
              h("h2", { className: "res-headline" }, p.headline)
            ),
            h("p", { className: "res-desc" }, p.desc),
            h("div", { className: "space-xl" }),
            h("p", { className: "trait-text" }, p.body),
            h("div", { className: "space-xl" }),
            h("div", { className: "section-label" }, ui.sectionMap),
            h("div", { className: "rank-list" },
              result.ranking.map(function(dim, i) {
                var c = DIM_COLORS[dim];
                var m = dimMeta[dim];
                var isOpen = expandedRank === dim;
                var maxScore = Math.max.apply(null, Object.values(result.scores));
                var barPct = maxScore > 0 ? Math.round((result.scores[dim] / maxScore) * 100) : 0;
                return h("div", { key: dim },
                  h("div", { className: "rank-item", style: { borderColor: isOpen ? c + "40" : "transparent" }, onClick: function() { setExpandedRank(isOpen ? null : dim); } },
                    h("div", { className: "rank-header" },
                      h("div", { className: "rank-info" },
                        h("div", { className: "rank-name", style: { color: i === 0 ? c : "var(--ink)" } }, m.name),
                        h("div", { className: "rank-tagline" }, m.tagline),
                        h("div", { className: "rank-bar-wrap" },
                          h("div", { className: "rank-bar", style: { width: barPct + "%", background: c, opacity: i === 0 ? 1 : 0.35 } })
                        )
                      ),
                      h("span", { className: "rank-chevron" + (isOpen ? " open" : "") },
                        h("svg", { width: 12, height: 12, viewBox: "0 0 12 12", fill: "none" },
                          h("path", { d: "M2 4l4 4 4-4", stroke: "currentColor", strokeWidth: "1.5", strokeLinecap: "round", strokeLinejoin: "round" })
                        )
                      )
                    )
                  ),
                  isOpen && h("div", { className: "rank-expand" },
                    h("p", { className: "rank-expand-text" }, axisExplain[dim]),
                    h("p", { className: "rank-expand-chapter", style: { color: c } }, ui.chapterRef.replace("{n}", CHAPTER_MAP[dim]))
                  )
                );
              })
            ),
            h("div", { className: "space-xl" }),
            h("div", { className: "blindspot-wrap" },
              h("div", { className: "blindspot-bar", style: { background: leastColor } }),
              h("p", { className: "blindspot-text" },
                ui.blindspotIntro,
                h("strong", { style: { color: leastColor } }, dimMeta[least].name),
                ui.blindspotMid,
                h("strong", null, BLINDSPOT_PROBLEMS[lang][least]),
                "."
              )
            ),
            h("div", { className: "space-lg", style: { height: 40 } }),
            h("div", { className: "prompt-wrap" },
              h("p", { className: "prompt-text" }, PRACTICE_PROMPTS[lang][least])
            ),
            h("div", { className: "share-section" },
              h("button", { className: "btn-share-linkedin", onClick: handleShare },
                h("svg", { width: 16, height: 16, viewBox: "0 0 24 24", fill: "currentColor" },
                  h("path", { d: "M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" })
                ),
                lang === "pt" ? "Compartilhar" : "Share"
              )
            ),
            h("div", { className: "book-section" },
              h("p", { className: "book-bridge" },
                lang === "pt"
                  ? h(React.Fragment, null, "Voc\u00ea viu seu padr\u00e3o. ", h("strong", null, "A Arte do Prompt"), " \u00e9 um livro de 25 cap\u00edtulos curtos que ensina a usar os 4 eixos com inten\u00e7\u00e3o. Pra IA, pessoas e si mesmo.")
                  : h(React.Fragment, null, "You saw your pattern. ", h("strong", null, "The Art of Prompting"), " is a 25-chapter book that teaches how to use all 4 axes with intention. For AI, people, and yourself.")
              ),
              h("div", { className: "book-card" },
                h("div", { className: "book-content" },
                  h("div", { className: "book-cover" },
                    h("img", { src: lang === "pt" ? "PROMPTcapanova.png" : "PROMPTcapanovaEN.png", alt: ui.bookTitle })
                  ),
                  h("div", { className: "book-text" },
                    h("div", { className: "book-teaser-label" }, ui.bookTitle),
                    h("p", { className: "book-chapters" },
                      lang === "pt"
                        ? h(React.Fragment, null, "Cap. ", h("strong", null, CHAPTER_MAP[result.dominant]), " \u2192 ", dimMeta[result.dominant].name, " (seu forte)", h("br"), "Cap. ", h("strong", null, CHAPTER_MAP[least]), " \u2192 ", dimMeta[least].name, " (seu ponto cego)")
                        : h(React.Fragment, null, "Ch. ", h("strong", null, CHAPTER_MAP[result.dominant]), " \u2192 ", dimMeta[result.dominant].name, " (your strength)", h("br"), "Ch. ", h("strong", null, CHAPTER_MAP[least]), " \u2192 ", dimMeta[least].name, " (your blind spot)")
                    ),
                    h("a", { href: "https://ryopenna.com/prompt-landing", target: "_blank", rel: "noopener noreferrer", className: "btn-book" },
                      lang === "pt" ? "Conhecer o livro" : "Discover the book"
                    )
                  )
                )
              )
            ),
            h("div", { className: "actions-wrap", style: { marginTop: "32px" } },
              h("button", { className: "btn-restart", onClick: restart }, ui.restart)
            ),
            h(Footer)
          );
        })()
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(PromptStyleAssessment));
</script>
</body>
</html>
